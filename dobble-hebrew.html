<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>דבל אותיות</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
  }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    direction: rtl;
    background: linear-gradient(135deg, #b3d4f7 0%, #d0e8ff 45%, #a8c8f8 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100dvh;
    width: 100vw;
  }
  #app {
    background: linear-gradient(160deg, #e8f3ff 0%, #dceeff 100%);
    border-radius: 20px;
    box-shadow: 0 8px 32px rgba(30,90,200,0.15);
    padding: 10px 12px;
    width: min(340px, 96vw);
    border: 1.5px solid #90bef5;
    display: flex;
    flex-direction: column;
    max-height: 96dvh;
  }
  .score-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 7px;
    flex-shrink: 0;
  }
  .score-pill {
    background: linear-gradient(90deg, #4a90e2 0%, #1565c0 100%);
    border-radius: 999px;
    padding: 4px 14px;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
  }
  .timer-wrap {
    height: 8px;
    background: #c5dcf8;
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 5px;
    border: 1px solid #90bef5;
    flex-shrink: 0;
  }
  .timer-bar {
    height: 100%;
    border-radius: 99px;
    transition: width 0.1s linear, background 0.3s;
    background: #1565c0;
  }
  .progress {
    font-size: 11px;
    color: #1a5fb4;
    text-align: center;
    margin-bottom: 4px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .card-wrap {
    display: flex;
    justify-content: center;
    flex-shrink: 0;
    margin-bottom: 5px;
  }
  canvas.card-canvas {
    border-radius: 50%;
    cursor: pointer;
    display: block;
    box-shadow: 0 4px 18px rgba(30,90,200,0.22);
  }
  .status {
    font-size: 12px;
    color: #1040a0;
    text-align: center;
    min-height: 18px;
    margin-bottom: 6px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .mic-btn {
    display: block;
    width: 100%;
    padding: 10px;
    border-radius: 14px;
    border: 1.5px solid #90bef5;
    background: linear-gradient(90deg, #e8f3ff 0%, #dceeff 100%);
    font-size: 14px;
    font-weight: 700;
    color: #1040a0;
    cursor: pointer;
    margin-bottom: 7px;
    transition: background 0.15s;
    font-family: inherit;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .mic-btn.listening {
    background: linear-gradient(90deg, #e8f5e9 0%, #c8e6c9 100%);
    border-color: #388e3c;
    color: #1b5e20;
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.7; }
  }
  .result-bar { display: flex; gap: 8px; flex-shrink: 0; }
  .result-item {
    flex: 1;
    background: linear-gradient(135deg, #c5dcf8 0%, #a8c8f8 100%);
    border-radius: 12px;
    padding: 5px 4px;
    text-align: center;
    font-size: 12px;
    color: #1040a0;
    font-weight: 700;
    border: 1px solid #90bef5;
  }
  .result-item span {
    display: block;
    font-size: 20px;
    font-weight: 800;
    color: #0d2e7a;
  }

  /* Ready screen */
  #ready-screen {
    text-align: center;
    padding: 16px 0 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
  }
  #ready-screen .big-emoji { font-size: 56px; display: block; margin-bottom: 10px; }
  #ready-screen h2 { font-size: 20px; font-weight: 800; color: #0d2e7a; margin-bottom: 8px; }
  #ready-screen p { font-size: 13px; color: #1a5fb4; margin-bottom: 18px; line-height: 1.6; font-weight: 600; }
  .go-btn {
    padding: 13px 40px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(90deg, #1565c0 0%, #42a5f5 100%);
    font-size: 18px;
    font-weight: 800;
    cursor: pointer;
    color: #fff;
    font-family: inherit;
    box-shadow: 0 4px 16px rgba(21,101,192,0.35);
    -webkit-tap-highlight-color: transparent;
  }

  /* End screen */
  #end-screen {
    text-align: center;
    padding: 16px 0 10px;
    position: relative;
    overflow: hidden;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  #end-screen h2 { font-size: 22px; font-weight: 800; margin-bottom: 6px; color: #0d2e7a; position: relative; z-index: 2; }
  #end-screen p { font-size: 14px; color: #1a5fb4; margin-bottom: 16px; position: relative; z-index: 2; font-weight: 600; }
  .trophy { font-size: 64px; display: block; margin-bottom: 10px; position: relative; z-index: 2; }
  .restart-btn {
    padding: 12px 34px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(90deg, #1565c0 0%, #42a5f5 100%);
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    color: #fff;
    font-family: inherit;
    position: relative;
    z-index: 2;
    box-shadow: 0 4px 16px rgba(21,101,192,0.35);
    -webkit-tap-highlight-color: transparent;
  }
  #confetti-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }
</style>
</head>
<body>
<div id="app">
  <div id="game" style="display:flex;flex-direction:column;flex:1;min-height:0;"></div>
</div>

<script>
const LETTERS = 'אבגדהוזחטיכלמנסעפצקרשת'.split('');
const COLORS = [
  '#1565c0','#0d47a1','#1976d2','#2196f3','#42a5f5',
  '#0288d1','#01579b','#1a237e','#283593','#0277bd',
  '#039be5','#0288d1'
];
const TOTAL = 15;
const PLAYER_MS = 10000;

let S = {};
let CARD_SIZE = 280;

function calcCardSize() {
  const vh = window.innerHeight;
  const vw = window.innerWidth;
  const appW = Math.min(340, vw * 0.96);
  const available = vh * 0.96 - 200;
  const maxFromH = Math.floor((available - 20) / 2);
  const maxFromW = Math.floor(appW - 20);
  CARD_SIZE = Math.max(100, Math.min(maxFromH, maxFromW, 280));
}

function shuffle(a) { return [...a].sort(() => Math.random() - 0.5); }

/* ── Audio ── */
let audioCtx = null;
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playSuccess() {
  try {
    const ctx = getCtx();
    [[523,0],[659,0.12],[784,0.24],[1047,0.38]].forEach(([f,t]) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = f; o.type = 'sine';
      g.gain.setValueAtTime(0, ctx.currentTime+t);
      g.gain.linearRampToValueAtTime(0.18, ctx.currentTime+t+0.03);
      g.gain.linearRampToValueAtTime(0, ctx.currentTime+t+0.18);
      o.start(ctx.currentTime+t); o.stop(ctx.currentTime+t+0.22);
    });
  } catch(e) {}
}
function playFail() {
  try {
    const ctx = getCtx();
    [[330,0],[277,0.15]].forEach(([f,t]) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = f; o.type = 'sawtooth';
      g.gain.setValueAtTime(0, ctx.currentTime+t);
      g.gain.linearRampToValueAtTime(0.10, ctx.currentTime+t+0.03);
      g.gain.linearRampToValueAtTime(0, ctx.currentTime+t+0.2);
      o.start(ctx.currentTime+t); o.stop(ctx.currentTime+t+0.24);
    });
  } catch(e) {}
}
function playApplause() {
  try {
    const ctx = getCtx();
    for (let i = 0; i < 6; i++) {
      setTimeout(() => {
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.08, ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let j = 0; j < d.length; j++) d[j] = (Math.random() * 2 - 1) * 0.3;
        const src = ctx.createBufferSource(), g = ctx.createGain();
        src.buffer = buf; src.connect(g); g.connect(ctx.destination);
        g.gain.setValueAtTime(0.4, ctx.currentTime);
        g.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.08);
        src.start();
      }, i * 140);
    }
  } catch(e) {}
}

/* ── Card drawing ── */
function drawCard(canvas, letters, highlightLetter, highlightColor) {
  const S2 = CARD_SIZE;
  canvas.width = S2; canvas.height = S2;
  const ctx = canvas.getContext('2d');
  const R = S2/2 - 2, cx = S2/2, cy = S2/2;
  ctx.clearRect(0, 0, S2, S2);
  ctx.save();
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI*2); ctx.clip();
  const grad = ctx.createRadialGradient(cx-S2*0.1, cy-S2*0.1, S2*0.07, cx, cy, R);
  grad.addColorStop(0, '#f0f7ff');
  grad.addColorStop(1, '#d0e8ff');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, S2, S2);
  ctx.restore();
  ctx.save();
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI*2);
  ctx.strokeStyle = '#90bef5'; ctx.lineWidth = 2; ctx.stroke();
  ctx.restore();

  const positions = getPositions(letters.length, R - S2*0.06, cx, cy);
  const baseSize = S2 * 0.18;
  const sizes = [baseSize*0.85, baseSize, baseSize*1.15, baseSize*0.92, baseSize*0.78, baseSize*1.08, baseSize*0.88, baseSize*1.05];
  const szShuf = canvas._sizes || shuffle(sizes).slice(0, letters.length);
  const colShuf = canvas._cols || shuffle(COLORS).slice(0, letters.length);
  const rotShuf = canvas._rots || letters.map(() => (Math.random()-0.5)*1.3);

  if (!canvas._sizes) { canvas._sizes = szShuf; canvas._cols = colShuf; canvas._rots = rotShuf; }

  letters.forEach((l, i) => {
    const { x, y } = positions[i];
    ctx.save();
    ctx.translate(x, y); ctx.rotate(rotShuf[i]);
    const isHighlight = highlightLetter && l === highlightLetter;
    if (isHighlight) {
      ctx.shadowColor = highlightColor === 'green' ? '#00c853' : '#ff1744';
      ctx.shadowBlur = 12;
      ctx.fillStyle = highlightColor === 'green' ? '#00c853' : '#ff1744';
    } else {
      ctx.fillStyle = colShuf[i];
    }
    ctx.font = `bold ${Math.round(szShuf[i])}px Arial, sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(l, 0, 0);
    ctx.restore();
  });

  canvas._letters = letters;
  canvas._positions = positions;
}

function getPositions(n, maxR, cx, cy) {
  const pts = [];
  const rings = n <= 5
    ? [{ r: maxR*0.42, count: n }]
    : [{ r: maxR*0.28, count: 3 }, { r: maxR*0.68, count: n-3 }];
  rings.forEach(ring => {
    for (let i = 0; i < ring.count; i++) {
      const angle = (2*Math.PI/ring.count)*i - Math.PI/2 + (Math.random()-0.5)*0.25;
      pts.push({ x: cx + ring.r*Math.cos(angle), y: cy + ring.r*Math.sin(angle) });
    }
  });
  return shuffle(pts).slice(0, n);
}

function hitTest(canvas, mx, my) {
  if (!canvas._letters) return null;
  const rect = canvas.getBoundingClientRect();
  const sx = CARD_SIZE / rect.width, sy = CARD_SIZE / rect.height;
  const cx2 = (mx - rect.left)*sx, cy2 = (my - rect.top)*sy;
  let best = null, bestD = 9999;
  canvas._letters.forEach((l, i) => {
    const { x, y } = canvas._positions[i];
    const d = Math.hypot(cx2-x, cy2-y);
    const sz = (canvas._sizes[i] || CARD_SIZE*0.18) * 0.75;
    if (d < sz && d < bestD) { bestD = d; best = l; }
  });
  return best;
}

function clearCardCache(canvas) {
  canvas._sizes = null; canvas._cols = null; canvas._rots = null;
  canvas._letters = null; canvas._positions = null;
}

/* ── Ready screen ── */
function showReadyScreen(roundNum, callback) {
  document.getElementById('game').innerHTML = `
    <div id="ready-screen">
      <span class="big-emoji">⚡</span>
      <h2>סיבוב ${roundNum} מתוך ${TOTAL}</h2>
      <p>היה מוכן!<br>מצא את האות שמופיעה<br>בשני הכרטיסים לפני המחשב</p>
      <button class="go-btn" id="go-btn">קדימה! 🚀</button>
    </div>`;
  document.getElementById('go-btn').onclick = callback;
}

/* ── Game logic ── */
function startGame() {
  calcCardSize();
  S = {
    round: 1, childScore: 0, cpuScore: 0, childCards: 0, cpuCards: 0,
    shared: null, timerInt: null, cpuTimer: null, active: false,
    listening: false, recognition: null, currentLetters: null
  };
  showReadyScreen(1, () => launchRound());
}

function buildGameUI() {
  document.getElementById('game').innerHTML = `
    <div class="score-bar">
      <div class="score-pill">😊 <span id="child-score">0</span></div>
      <div class="score-pill">🤖 <span id="cpu-score">0</span></div>
    </div>
    <div class="timer-wrap"><div class="timer-bar" id="timer-bar" style="width:100%"></div></div>
    <div class="progress" id="progress">סיבוב ${S.round} מתוך ${TOTAL}</div>
    <div class="card-wrap"><canvas id="canvas-top" class="card-canvas"></canvas></div>
    <div class="card-wrap"><canvas id="canvas-bot" class="card-canvas"></canvas></div>
    <div class="status" id="status-msg">מצא את האות שמופיעה בשני הכרטיסים!</div>
    <button class="mic-btn" id="mic-btn" onclick="startListening()">🎤 אמור את האות</button>
    <div class="result-bar">
      <div class="result-item">איתי <span id="child-cards">0</span></div>
      <div class="result-item">מחשב <span id="cpu-cards">0</span></div>
    </div>`;
  document.getElementById('canvas-top').addEventListener('click', e => onCanvasClick(e, 'top'));
  document.getElementById('canvas-bot').addEventListener('click', e => onCanvasClick(e, 'bot'));
}

function launchRound() {
  buildGameUI();
  updateScores();
  const r = genRound();
  S.shared = r.shared;
  S.currentLetters = { top: r.c1, bot: r.c2 };
  S.active = true;
  const top = document.getElementById('canvas-top');
  const bot = document.getElementById('canvas-bot');
  clearCardCache(top); clearCardCache(bot);
  drawCard(top, r.c1, null, null);
  drawCard(bot, r.c2, null, null);
  startTimer();
}

function onCanvasClick(e, which) {
  if (!S.active) return;
  const c = document.getElementById('canvas-' + which);
  const l = hitTest(c, e.clientX, e.clientY);
  if (!l) return;
  if (l === S.shared) playerWins(); else wrongGuess();
}

function wrongGuess() {
  document.getElementById('status-msg').textContent = 'לא נכון, נסה שוב! ❌';
}

function genRound() {
  const shared = LETTERS[Math.floor(Math.random() * LETTERS.length)];
  const rest = shuffle(LETTERS.filter(l => l !== shared));
  return {
    c1: shuffle([shared, ...rest.slice(0, 7)]),
    c2: shuffle([shared, ...rest.slice(7, 14)]),
    shared
  };
}

let timerInt2;
function startTimer() {
  clearInterval(timerInt2); clearTimeout(S.cpuTimer);
  let elapsed = 0;
  const bar = document.getElementById('timer-bar');
  if (bar) { bar.style.width = '100%'; bar.style.background = '#1565c0'; }
  timerInt2 = setInterval(() => {
    elapsed += 100;
    const pct = Math.max(0, 100 - (elapsed / PLAYER_MS * 100));
    if (bar) {
      bar.style.width = pct + '%';
      if (elapsed > PLAYER_MS * 0.85) bar.style.background = '#E24B4A';
      else if (elapsed > PLAYER_MS * 0.6) bar.style.background = '#EF9F27';
      else bar.style.background = '#1565c0';
    }
  }, 100);
  S.cpuTimer = setTimeout(() => {
    if (S.active) { clearInterval(timerInt2); cpuWins(); }
  }, PLAYER_MS);
}

function afterRound() {
  S.round++;
  if (S.round > TOTAL) {
    setTimeout(() => endGame(), 2200);
  } else {
    setTimeout(() => showReadyScreen(S.round, () => launchRound()), 2200);
  }
}

function highlightShared(color) {
  const top = document.getElementById('canvas-top');
  const bot = document.getElementById('canvas-bot');
  if (top && S.currentLetters) drawCard(top, S.currentLetters.top, S.shared, color);
  if (bot && S.currentLetters) drawCard(bot, S.currentLetters.bot, S.shared, color);
}

function cpuWins() {
  if (!S.active) return;
  S.active = false; stopListening(); clearInterval(timerInt2);
  S.cpuScore++; S.cpuCards++;
  const bar = document.getElementById('timer-bar');
  if (bar) bar.style.width = '0%';
  document.getElementById('status-msg').textContent = `⏰ זמן נגמר! האות: ${S.shared} — למחשב 🤖`;
  highlightShared('red');
  playFail();
  updateScores();
  afterRound();
}

function playerWins() {
  if (!S.active) return;
  S.active = false; stopListening(); clearInterval(timerInt2); clearTimeout(S.cpuTimer);
  S.childScore++; S.childCards++;
  document.getElementById('status-msg').textContent = `🎉 כל הכבוד! האות ${S.shared} — הקלף שלך!`;
  highlightShared('green');
  playSuccess();
  updateScores();
  afterRound();
}

function updateScores() {
  const cs = document.getElementById('child-score');
  const cpu = document.getElementById('cpu-score');
  const cc = document.getElementById('child-cards');
  const cpc = document.getElementById('cpu-cards');
  if (cs) cs.textContent = S.childScore;
  if (cpu) cpu.textContent = S.cpuScore;
  if (cc) cc.textContent = S.childCards;
  if (cpc) cpc.textContent = S.cpuCards;
}

/* ── End screen ── */
function endGame() {
  clearInterval(timerInt2); clearTimeout(S.cpuTimer);
  const won = S.childCards > S.cpuCards;
  const tie = S.childCards === S.cpuCards;
  document.getElementById('game').innerHTML = `
    <div id="end-screen">
      <canvas id="confetti-canvas"></canvas>
      <span class="trophy">${won ? '🏆' : tie ? '🤝' : '🤖'}</span>
      <h2>${won ? 'כל הכבוד, ניצחת! 🎉' : tie ? 'תיקו!' : 'המחשב ניצח הפעם'}</h2>
      <p>איתי: ${S.childCards} קלפים &nbsp;|&nbsp; מחשב: ${S.cpuCards} קלפים</p>
      <button class="restart-btn" onclick="startGame()">שחק שוב</button>
    </div>`;
  if (won) { playApplause(); setTimeout(() => startConfetti(), 100); }
}

/* ── Confetti ── */
function startConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  if (!canvas) return;
  const end = document.getElementById('end-screen');
  canvas.width = end.offsetWidth || 308;
  canvas.height = end.offsetHeight || 300;
  const ctx = canvas.getContext('2d');
  const confettiColors = ['#1565c0','#42a5f5','#0d47a1','#90caf9','#1976d2','#ffd700','#ffffff','#64b5f6'];
  const pieces = Array.from({ length: 80 }, () => ({
    x: Math.random() * canvas.width, y: Math.random() * -canvas.height * 0.5,
    w: 7 + Math.random() * 7, h: 4 + Math.random() * 5,
    color: confettiColors[Math.floor(Math.random() * confettiColors.length)],
    rot: Math.random() * Math.PI * 2,
    vx: (Math.random()-0.5)*3, vy: 2+Math.random()*3, vr: (Math.random()-0.5)*0.15
  }));
  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.color; ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
      p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      if (p.y > canvas.height) { p.y = -20; p.x = Math.random()*canvas.width; }
    });
    frame++;
    if (frame < 220) requestAnimationFrame(draw);
  }
  draw();
}

/* ── Speech (Safari/iOS compatible) ── */
const LNAMES = {
  'א':'אלף','ב':'בית','ג':'גימל','ד':'דלת','ה':'הא','ו':'וו','ז':'זין','ח':'חית',
  'ט':'טית','י':'יוד','כ':'כף','ל':'למד','מ':'מם','נ':'נון','ס':'סמך','ע':'עין',
  'פ':'פא','צ':'צדיק','ק':'קוף','ר':'ריש','ש':'שין','ת':'תו'
};

function startListening() {
  if (!S.active) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    document.getElementById('status-msg').textContent = 'לחץ על האות ישירות על הכרטיס';
    return;
  }
  if (S.listening) return;

  S.listening = true;
  const btn = document.getElementById('mic-btn');
  if (btn) { btn.className = 'mic-btn listening'; btn.textContent = '🔴 מאזין...'; }
  document.getElementById('status-msg').textContent = 'אמור את שם האות...';

  const rec = new SR();
  rec.lang = 'he-IL';
  rec.continuous = false;
  rec.interimResults = false;
  rec.maxAlternatives = 3;
  S.recognition = rec;

  rec.onresult = e => {
    S.listening = false;
    resetMicBtn();
    const results = Array.from(e.results[0]).map(r => r.transcript.trim());
    checkSpokenMultiple(results);
  };
  rec.onerror = e => {
    S.listening = false;
    resetMicBtn();
    if (e.error === 'not-allowed') {
      document.getElementById('status-msg').textContent = 'אין הרשאה למיקרופון — לחץ על האות';
    } else {
      document.getElementById('status-msg').textContent = 'לא שמעתי, נסה שוב';
    }
  };
  rec.onend = () => {
    S.listening = false;
    resetMicBtn();
  };

  try { rec.start(); } catch(e) { S.listening = false; resetMicBtn(); }
}

function resetMicBtn() {
  const b = document.getElementById('mic-btn');
  if (b) { b.className = 'mic-btn'; b.textContent = '🎤 אמור את האות'; }
}

function stopListening() {
  if (S.recognition) { try { S.recognition.stop(); } catch(e) {} S.recognition = null; }
  S.listening = false;
  resetMicBtn();
}

function checkSpokenMultiple(results) {
  if (!S.active) return;
  for (const said of results) {
    if (checkOneSaid(said)) return;
  }
  document.getElementById('status-msg').textContent = `שמעתי: "${results[0]}" — לא נכון`;
}

function checkOneSaid(said) {
  const clean = said.replace(/[^\u05D0-\u05EA]/g, '');
  const name = LNAMES[S.shared] || '';
  if (clean === S.shared || said.includes(name) || said.includes(S.shared) || clean.startsWith(S.shared)) {
    playerWins();
    return true;
  }
  return false;
}

calcCardSize();
startGame();
</script>
